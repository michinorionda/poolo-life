<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Shippori+Mincho+B1:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1200px; height: 630px;
    background: #FFFCF6;
    font-family: 'Shippori Mincho B1', serif;
    overflow: hidden;
  }
  .hero {
    width: 1200px; height: 630px;
    display: grid;
    grid-template-columns: 4.2fr 7.8fr;
    background: #FFFCF6;
  }
  .photo {
    height: 630px;
    background-image: url('images/04_seaside.jpg');
    background-size: cover;
    background-position: center 60%;
    filter: saturate(0.9) sepia(0.08) brightness(1.0);
    position: relative;
  }
  .photo::after {
    content: "";
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(45,62,54,0.0) 60%, rgba(45,62,54,0.45) 100%);
  }
  .photo .vol-num {
    position: absolute;
    bottom: 24px; left: 28px;
    color: #FFFCF6;
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    letter-spacing: 0.45em;
    text-transform: uppercase;
    font-weight: 500;
    z-index: 2;
  }

  .content {
    height: 630px;
    background: #FFFCF6;
    position: relative;
    padding: 50px 70px 50px 70px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .tag-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .tag {
    background: #1B99B7;
    color: #fff;
    padding: 7px 16px;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.12em;
    border-radius: 2px;
    font-family: 'Shippori Mincho B1', serif;
  }
  .tag-en {
    font-family: 'Cormorant Garamond', serif;
    font-size: 12px;
    letter-spacing: 0.4em;
    color: #8a8a8a;
    text-transform: uppercase;
    font-weight: 600;
    font-style: italic;
  }

  .hero-title {
    margin-top: 18px;
    font-family: 'Shippori Mincho B1', serif;
    font-size: 96px;
    font-weight: 700;
    letter-spacing: 0.05em;
    line-height: 1.05;
    color: #2D3E36;
  }
  .hero-title .em { color: #1B99B7; }
  .hero-title small {
    display: block;
    font-size: 24px;
    font-weight: 500;
    color: #5A6760;
    letter-spacing: 0.1em;
    margin-top: 8px;
    line-height: 1.4;
  }

  .compare {
    margin-top: 28px;
    display: grid;
    grid-template-columns: 1fr 50px 1fr;
    align-items: stretch;
    gap: 0;
  }
  .col-from, .col-to {
    padding: 16px 18px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .col-from {
    border-left: 3px solid #C97C5D;
    background: rgba(201,124,93,0.06);
  }
  .col-to {
    border-left: 3px solid #1B99B7;
    background: rgba(27,153,183,0.06);
  }
  .col-from .kind, .col-to .kind {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    font-weight: 700;
  }
  .col-from .kind { color: #C97C5D; }
  .col-to .kind { color: #1B99B7; }
  .col-from .label, .col-to .label {
    font-family: 'Shippori Mincho B1', serif;
    font-size: 12px;
    letter-spacing: 0.06em;
    color: #5A5A5A;
    font-weight: 500;
  }
  .col-from .word {
    font-family: 'Shippori Mincho B1', serif;
    font-size: 21px;
    font-weight: 600;
    letter-spacing: 0.02em;
    color: #8a7a72;
    text-decoration: line-through;
    text-decoration-color: #C97C5D;
    text-decoration-thickness: 2px;
  }
  .col-to .word {
    font-family: 'Shippori Mincho B1', serif;
    font-size: 23px;
    font-weight: 700;
    letter-spacing: 0.02em;
    color: #1B99B7;
  }
  .arrow {
    display: flex;
    align-items: center;
    justify-content: center;
    color: #2D3E36;
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px;
    font-weight: 400;
  }

  .date {
    margin-top: auto;
    padding: 12px 0 0 0;
    border-top: 1.5px solid #1B99B7;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: #2D3E36;
    display: flex;
    align-items: baseline;
    gap: 12px;
    white-space: nowrap;
  }
  .date .small { font-size: 12px; color: #5A5A5A; font-weight: 500; }
  .date .place { font-size: 13px; color: #2A2A2A; font-weight: 500; margin-left: 4px; }
</style>
</head>
<body>
  <div class="hero">
    <div class="photo">
      <div class="vol-num">VOL. 02 · ONLINE DIALOGUE</div>
    </div>
    <div class="content">
      <div class="tag-row">
        <span class="tag">30代の生き方シリーズvol.02</span>
        <span class="tag-en">A Dialogue for Your 30s</span>
      </div>

      <h1 class="hero-title">
        30代の<span class="em">生き方</span>を、
        <small>「目標逆算型」から「関心探究型」へ問い直す90分。</small>
      </h1>

      <div class="compare">
        <div class="col-from">
          <span class="kind">From</span>
          <span class="label">目標逆算型の</span>
          <span class="word">「やらねばならない」</span>
        </div>
        <div class="arrow">→</div>
        <div class="col-to">
          <span class="kind">To</span>
          <span class="label">関心探究型の</span>
          <span class="word">「やりたい欲求」</span>
        </div>
      </div>

      <div class="date">
        <span>X/X <span class="small">(X)</span></span>
        <span>XX:XX〜XX:XX</span>
        <span class="place">@Zoom</span>
      </div>
    </div>
  </div>
</body>
</html>
