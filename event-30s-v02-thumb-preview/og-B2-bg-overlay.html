<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Shippori+Mincho+B1:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1200px; height: 630px;
    background: #FFFCF6;
    font-family: 'Shippori Mincho B1', serif;
    overflow: hidden;
  }
  .hero {
    position: relative;
    width: 1200px; height: 630px;
    background-image: url('images/04_seaside.jpg');
    background-size: cover;
    background-position: center 50%;
  }
  .hero::before {
    content: "";
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,252,246,0.94) 0%, rgba(255,252,246,0.82) 50%, rgba(255,252,246,0.74) 100%);
  }
  .frame {
    position: relative;
    z-index: 2;
    width: 100%; height: 100%;
    padding: 60px 80px 60px 80px;
    display: flex;
    flex-direction: column;
  }
  .top-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .tag {
    background: #1B99B7;
    color: #fff;
    padding: 8px 18px;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.12em;
    border-radius: 2px;
    font-family: 'Shippori Mincho B1', serif;
  }
  .vol {
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px;
    letter-spacing: 0.45em;
    color: #5A6760;
    font-weight: 500;
    font-style: italic;
    text-transform: uppercase;
  }

  .center {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
  }
  .lead {
    font-size: 18px;
    letter-spacing: 0.18em;
    color: #5A6760;
    font-weight: 500;
    margin-bottom: 18px;
  }
  .hero-title {
    font-family: 'Shippori Mincho B1', serif;
    font-size: 110px;
    font-weight: 700;
    letter-spacing: 0.05em;
    line-height: 1.1;
    color: #2D3E36;
    margin-bottom: 20px;
  }
  .hero-title .em { color: #1B99B7; }

  .compare {
    margin-top: 8px;
    display: grid;
    grid-template-columns: 1fr 60px 1fr;
    align-items: center;
    gap: 16px;
    width: 88%;
    max-width: 880px;
    padding: 18px 28px;
    background: rgba(255,252,246,0.85);
    border: 1px solid #D4CFC2;
    border-radius: 4px;
  }
  .col-from, .col-to {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .col-from .kind, .col-to .kind {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #8a8a8a;
    font-weight: 600;
  }
  .col-from .label, .col-to .label {
    font-size: 12px;
    letter-spacing: 0.06em;
    color: #5A5A5A;
    font-weight: 500;
  }
  .col-from .word {
    font-family: 'Shippori Mincho B1', serif;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: #8a8a8a;
    text-decoration: line-through;
    text-decoration-color: #C97C5D;
    text-decoration-thickness: 2px;
  }
  .col-to .word {
    font-family: 'Shippori Mincho B1', serif;
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: #1B99B7;
  }
  .arrow {
    text-align: center;
    color: #C97C5D;
    font-family: 'Cormorant Garamond', serif;
    font-size: 36px;
    font-weight: 400;
  }

  .date {
    margin-top: 20px;
    padding: 10px 22px;
    background: #2D3E36;
    color: #FFFCF6;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.06em;
    display: inline-flex;
    align-items: baseline;
    gap: 12px;
    white-space: nowrap;
    border-radius: 2px;
  }
  .date .small { font-size: 11px; opacity: 0.8; font-weight: 500; }
  .date .place { font-size: 12px; opacity: 0.85; font-weight: 500; margin-left: 4px; }

  .bottom-row {
    display: flex;
    justify-content: center;
  }
</style>
</head>
<body>
  <div class="hero">
    <div class="frame">
      <div class="top-row">
        <span class="tag">30代の生き方シリーズvol.02</span>
        <span class="vol">ONLINE DIALOGUE</span>
      </div>

      <div class="center">
        <p class="lead">問い直す、その先で。</p>
        <h1 class="hero-title">30代の、<span class="em">生き方</span>。</h1>

        <div class="compare">
          <div class="col-from">
            <span class="kind">FROM</span>
            <span class="label">目標逆算型の</span>
            <span class="word">「やらねばならない」</span>
          </div>
          <div class="arrow">→</div>
          <div class="col-to">
            <span class="kind">TO</span>
            <span class="label">関心探究型の</span>
            <span class="word">「やりたい欲求」</span>
          </div>
        </div>
      </div>

      <div class="bottom-row">
        <div class="date">
          <span>X/X <span class="small">(X)</span></span>
          <span>XX:XX〜XX:XX</span>
          <span class="place">@Zoom</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
