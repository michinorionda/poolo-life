<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>POOLO 12期募集 — 広告C-2（通知擬態）1080×1080</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@400;700;900&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&family=Jost:wght@400;500;600&display=swap');

/* ==============================================
   POOLO 12期 新期メンバー募集 / Meta広告 スクエア
   案C-2：ロック画面・通知スタック擬態
   poolo-ds tokens 準拠（#189BBC / Jost / ZenKaku / Noto / ZenOldMincho）
   ============================================== */

:root{
  --brand:#189BBC;
  --brand-deep:#127E9A;
  --brand-pale:#DDECF1;
  --ink:#000000;
  --ink-72:rgba(0,0,0,.72);
  --ink-55:rgba(0,0,0,.55);
  --ink-40:rgba(0,0,0,.40);
  --line:#E4E4E4;
  --bg:#FFFFFF;
  --card:#F7F7F8;
  --mincho:'Zen Old Mincho','Hiragino Mincho ProN',serif;
  --head:'Zen Kaku Gothic New','Hiragino Kaku Gothic ProN',sans-serif;
  --body:'Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif;
  --en:'Jost',sans-serif;
}

*{margin:0;padding:0;box-sizing:border-box;}
body{margin:0;background:#333;}

.square{
  width:1080px;height:1080px;overflow:hidden;
  background:var(--bg);
  position:relative;
  font-family:var(--body);
  color:var(--ink);
  display:flex;flex-direction:column;
}

/* ---------- 上部：時計エリア ---------- */
.clock-zone{
  padding-top:46px;
  text-align:center;
  flex:0 0 auto;
}
.lock-glyph{
  width:28px;height:28px;margin:0 auto 12px;display:block;
  opacity:.82;
}
.date-line{
  font-family:var(--head);
  font-weight:500;
  font-size:29px;
  letter-spacing:.14em;
  color:var(--ink-72);
  margin-bottom:2px;
}
.time{
  font-family:var(--en);
  font-weight:500;
  font-size:166px;
  line-height:1.04;
  letter-spacing:.015em;
  color:var(--ink);
  font-variant-numeric:tabular-nums;
}

/* ---------- 通知スタック ---------- */
.stack{
  flex:1 1 auto;
  width:100%;
  padding:34px 84px 0;
  display:flex;flex-direction:column;align-items:center;
}

.notif{
  width:100%;
  background:var(--card);
  border:1px solid var(--line);
  border-radius:18px;
  padding:21px 30px 22px;
  display:flex;align-items:flex-start;gap:22px;
}
.notif + .notif{margin-top:15px;}

.app-icon{
  flex:0 0 auto;
  width:62px;height:62px;
  border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  background:#FFFFFF;
  border:1px solid var(--line);
}
.app-icon svg{display:block;}

.notif-body{flex:1 1 auto;min-width:0;}
.notif-meta{
  display:flex;align-items:baseline;justify-content:space-between;
  margin-bottom:5px;
}
.app-name{
  font-family:var(--head);
  font-weight:500;
  font-size:22px;
  letter-spacing:.16em;
  color:var(--ink-55);
}
.notif-time{
  font-family:var(--head);
  font-weight:400;
  font-size:22px;
  letter-spacing:.06em;
  color:var(--ink-40);
}
.notif-title{
  font-family:var(--head);
  font-weight:700;
  font-size:31px;
  line-height:1.32;
  letter-spacing:.02em;
  color:var(--ink);
}
.notif-text{
  font-family:var(--body);
  font-weight:400;
  font-size:28px;
  line-height:1.38;
  letter-spacing:.02em;
  color:var(--ink-72);
  margin-top:5px;
}

/* ---------- POOLO通知（最前面・主役） ---------- */
.notif--poolo{
  background:#FFFFFF;
  border:2px solid rgba(24,155,188,.55);
  border-radius:20px;
  padding:26px 34px 27px;
  margin-top:20px;
  position:relative;
}
/* 手前に浮く記号：背後に覗くスタックの縁（blurなしのフラット段差） */
.stack-peek{
  width:calc(100% - 56px);
  height:14px;
  border:1px solid var(--line);
  border-top:none;
  border-radius:0 0 14px 14px;
  background:var(--card);
  margin-top:-2px;
}
.stack-peek.p2{width:calc(100% - 112px);height:12px;border-radius:0 0 12px 12px;}

.notif--poolo .app-icon{
  width:72px;height:72px;
  border-radius:16px;
  background:var(--brand);
  border:none;
}
.poolo-p{
  font-family:var(--en);
  font-weight:600;
  font-size:40px;
  color:#FFFFFF;
  letter-spacing:.02em;
  transform:translateY(-1px);
}
.notif--poolo .app-name{color:var(--brand-deep);font-weight:700;}
.notif--poolo .notif-time{color:var(--brand);font-weight:500;}
.notif--poolo .notif-title{
  font-size:38px;
  line-height:1.3;
  margin-top:2px;
}
.notif--poolo .notif-title em{
  font-style:normal;
  color:var(--brand);
}
.notif--poolo .notif-text{
  font-size:30px;
  font-weight:500;
  color:var(--ink-72);
  margin-top:7px;
}
.notif--poolo .notif-text strong{
  font-weight:700;
  color:var(--ink);
}

/* ---------- 下部：署名＋ロック画面の記号 ---------- */
.bottom{
  flex:0 0 auto;
  padding:0 84px 26px;
  position:relative;
}
.sign{
  text-align:center;
  padding-top:24px;
  border-top:1px solid var(--line);
}
.sign-main{
  font-family:var(--mincho);
  font-weight:700;
  font-size:29px;
  letter-spacing:.1em;
  color:var(--ink-72);
}
.sign-sub{
  margin-top:10px;
  font-family:var(--en);
  font-weight:500;
  font-size:21px;
  letter-spacing:.3em;
  color:var(--ink-40);
}
.sign-sub .b{color:var(--brand);}

.corner-btn{
  position:absolute;
  bottom:60px;
  width:74px;height:74px;
  border-radius:50%;
  background:#F2F2F3;
  border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;
}
.corner-btn.left{left:84px;}
.corner-btn.right{right:84px;}

.home-indicator{
  width:270px;height:9px;
  border-radius:5px;
  background:#D8D8DA;
  margin:22px auto 0;
}
</style>
</head>
<body>
<div class="square">

  <!-- ===== 時計 ===== -->
  <div class="clock-zone">
    <svg class="lock-glyph" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="5" y="10.5" width="14" height="10" rx="2.4"/>
      <path d="M8 10.5V7.5a4 4 0 0 1 8 0v3"/>
    </svg>
    <div class="date-line">7月22日 水曜日</div>
    <div class="time">0:00</div>
  </div>

  <!-- ===== 通知スタック ===== -->
  <div class="stack">

    <!-- 通知1：リマインダー -->
    <div class="notif">
      <div class="app-icon">
        <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="rgba(0,0,0,.6)" stroke-width="1.9" stroke-linecap="round">
          <circle cx="5.5" cy="6" r="1.9"/>
          <line x1="10.5" y1="6" x2="19.5" y2="6"/>
          <circle cx="5.5" cy="12" r="1.9"/>
          <line x1="10.5" y1="12" x2="19.5" y2="12"/>
          <circle cx="5.5" cy="18" r="1.9"/>
          <line x1="10.5" y1="18" x2="16.5" y2="18"/>
        </svg>
      </div>
      <div class="notif-body">
        <div class="notif-meta">
          <span class="app-name">リマインダー</span>
          <span class="notif-time">昨日</span>
        </div>
        <div class="notif-title">“いつか旅する” の “いつか”</div>
        <div class="notif-text">今日も、まだ来てない</div>
      </div>
    </div>

    <!-- 通知2：カレンダー -->
    <div class="notif">
      <div class="app-icon">
        <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="rgba(0,0,0,.6)" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3.5" y="5" width="17" height="15.5" rx="2.6"/>
          <line x1="3.5" y1="10" x2="20.5" y2="10"/>
          <line x1="8" y1="3" x2="8" y2="6.5"/>
          <line x1="16" y1="3" x2="16" y2="6.5"/>
        </svg>
      </div>
      <div class="notif-body">
        <div class="notif-meta">
          <span class="app-name">カレンダー</span>
          <span class="notif-time">3時間前</span>
        </div>
        <div class="notif-title">この1年の予定</div>
        <div class="notif-text">特になし</div>
      </div>
    </div>

    <!-- 通知3：POOLO（最前面・主役） -->
    <div class="notif notif--poolo">
      <div class="app-icon">
        <span class="poolo-p">P</span>
      </div>
      <div class="notif-body">
        <div class="notif-meta">
          <span class="app-name">POOLO</span>
          <span class="notif-time">たった今</span>
        </div>
        <div class="notif-title">“いつか” に、<em>期限</em>をつけませんか？</div>
        <div class="notif-text"><strong>12期 新期メンバー募集</strong>がはじまりました</div>
      </div>
    </div>
    <div class="stack-peek"></div>
    <div class="stack-peek p2"></div>

  </div>

  <!-- ===== 下部 ===== -->
  <div class="bottom">
    <div class="sign">
      <div class="sign-main">旅を通して、生き方を問い直す1年。</div>
      <div class="sign-sub"><span class="b">POOLO</span>&nbsp;&nbsp;／&nbsp;&nbsp;by TABIPPO</div>
    </div>

    <div class="corner-btn left">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="rgba(0,0,0,.55)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 3h6v3.2a2.5 2.5 0 0 1-.5 1.5l-.7.9a2.5 2.5 0 0 0-.5 1.5V20a1.6 1.6 0 0 1-1.3 1 1.6 1.6 0 0 1-1.3-1v-9.9a2.5 2.5 0 0 0-.5-1.5l-.7-.9A2.5 2.5 0 0 1 9 6.2V3Z"/>
        <line x1="9" y1="5.6" x2="15" y2="5.6"/>
      </svg>
    </div>
    <div class="corner-btn right">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="rgba(0,0,0,.55)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 8.5a2 2 0 0 1 2-2h1.6l1.2-1.8a1.6 1.6 0 0 1 1.3-.7h3.8a1.6 1.6 0 0 1 1.3.7l1.2 1.8H18a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-8Z"/>
        <circle cx="12" cy="12.3" r="3.4"/>
      </svg>
    </div>

    <div class="home-indicator"></div>
  </div>

</div>
</body>
</html>
