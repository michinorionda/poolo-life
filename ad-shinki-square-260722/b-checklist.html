<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>POOLO 12期 Meta広告 B案：自己診断チェックリスト（1080×1080）</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@400;700;900&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&family=Jost:wght@400;500;600&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }
body { margin: 0; background: #FFF; }

.square {
  width: 1080px;
  height: 1080px;
  overflow: hidden;
  background: #FFF;
  color: #000;
  display: flex;
  flex-direction: column;
}

/* ---------- 上部：ラベル + 見出し ---------- */
.top {
  padding: 62px 80px 50px;
}

.label-row {
  display: flex;
  align-items: center;
  gap: 18px;
}
.label-sq {
  width: 13px;
  height: 13px;
  background: #189BBC;
  flex: none;
}
.label-en {
  font-family: 'Jost', sans-serif;
  font-weight: 600;
  font-size: 21px;
  letter-spacing: 0.28em;
  color: #000;
  flex: none;
}
.label-line {
  flex: 1;
  height: 1px;
  background: #E4E4E4;
}
.label-no {
  font-family: 'Jost', sans-serif;
  font-weight: 500;
  font-size: 21px;
  letter-spacing: 0.14em;
  color: #189BBC;
  flex: none;
}

h1 {
  margin-top: 42px;
  font-family: 'Zen Old Mincho', serif;
  font-weight: 900;
  font-size: 66px;
  line-height: 1.42;
  letter-spacing: 0.015em;
  color: #000;
}
h1 .blue { color: #189BBC; }

/* ---------- 中盤：チェックリスト ---------- */
.list {
  flex: 1;
  padding: 0 80px;
  border-top: 1px solid #E4E4E4;
  display: flex;
  flex-direction: column;
}
.item {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 30px;
  border-bottom: 1px solid #E4E4E4;
}
.item:last-child { border-bottom: none; }

.box {
  width: 46px;
  height: 46px;
  border: 3px solid #000;
  border-radius: 2px;
  flex: none;
}

.item-text {
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-weight: 700;
  font-size: 38px;
  letter-spacing: 0.02em;
  line-height: 1.35;
  flex: 1;
}

.item-no {
  font-family: 'Jost', sans-serif;
  font-weight: 500;
  font-size: 27px;
  letter-spacing: 0.1em;
  color: #C9C9C9;
  flex: none;
}

/* ---------- 下部：ブランドブルーのCTAベタ面 ---------- */
.cta {
  background: #189BBC;
  padding: 46px 80px 42px;
  color: #FFF;
}
.cta-main {
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-weight: 700;
  font-size: 42px;
  letter-spacing: 0.04em;
  line-height: 1.2;
}
.cta-main .en {
  font-family: 'Jost', sans-serif;
  font-weight: 600;
  letter-spacing: 0.05em;
}
.cta-sub {
  margin-top: 18px;
  padding-top: 16px;
  border-top: 1px solid rgba(255,255,255,0.35);
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 400;
  font-size: 19px;
  letter-spacing: 0.08em;
  color: rgba(255,255,255,0.92);
}
.cta-sub .en {
  font-family: 'Jost', sans-serif;
  font-weight: 500;
  letter-spacing: 0.1em;
}
</style>
</head>
<body>
<div class="square">

  <div class="top">
    <div class="label-row">
      <span class="label-sq"></span>
      <span class="label-en">SELF CHECK</span>
      <span class="label-line"></span>
      <span class="label-no">01 — 04</span>
    </div>
    <h1>2つ以上あてはまったら、<br>そろそろ、<span class="blue">POOLO</span>。</h1>
  </div>

  <div class="list">
    <div class="item">
      <span class="box"></span>
      <span class="item-text">毎日は回ってるのに、なんか物足りない</span>
      <span class="item-no">01</span>
    </div>
    <div class="item">
      <span class="box"></span>
      <span class="item-text">“いつか旅する”の“いつか”が来ない</span>
      <span class="item-no">02</span>
    </div>
    <div class="item">
      <span class="box"></span>
      <span class="item-text">利害じゃない仲間が、いま欲しい</span>
      <span class="item-no">03</span>
    </div>
    <div class="item">
      <span class="box"></span>
      <span class="item-text">生き方を、そろそろ自分で選びたい</span>
      <span class="item-no">04</span>
    </div>
  </div>

  <div class="cta">
    <div class="cta-main"><span class="en">POOLO 12</span>期 — 新期メンバー募集中</div>
    <div class="cta-sub">旅を通して生き方を問い直す1年間 ／ <span class="en">by TABIPPO</span></div>
  </div>

</div>
</body>
</html>
