<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>OG Thumbnail C — 1行連続・中に階層</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Noto+Sans+JP:wght@300;400;500;600;700&family=Shippori+Mincho+B1:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1200px; height: 630px;
    background: #FFFCF6;
    font-family: 'Shippori Mincho B1', serif;
    overflow: hidden;
  }
  .hero {
    width: 1200px; height: 630px;
    display: grid;
    grid-template-columns: 5fr 6fr;
  }
  .photo, .content { height: 630px; }
  .photo {
    background-image: url('images/01_542.jpg');
    background-size: cover;
    background-position: center bottom;
    filter: saturate(0.92) sepia(0.06) brightness(1.02);
  }
  .content {
    background: #FFFCF6;
    position: relative;
  }
  .tag-pos { position: absolute; top: 60px; left: 60px; right: 60px; }
  .main-block { position: absolute; top: 50%; left: 60px; right: 60px; transform: translateY(-50%); }
  .date-pos { position: absolute; bottom: 80px; left: 60px; right: 60px; }
  .vertical {
    position: absolute; right: 20px; top: 0; bottom: 0;
    writing-mode: vertical-rl;
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px; letter-spacing: 0.4em;
    color: rgba(45,62,54,0.09);
    font-weight: 700; font-style: italic;
    display: flex; align-items: center;
    text-transform: uppercase;
  }
  .tag {
    background: #1B99B7; color: #fff;
    padding: 10px 22px;
    font-size: 16px; font-weight: 500; letter-spacing: 0.12em;
    border-radius: 2px;
    font-family: 'Shippori Mincho B1', serif;
  }
  .title-lead {
    font-size: 24px; font-weight: 400;
    letter-spacing: 0.08em; line-height: 1.6;
    margin-bottom: 22px; color: #2D3E36;
  }
  .title {
    font-family: 'Shippori Mincho B1', serif;
    color: #2D3E36;
    line-height: 1.35;
    letter-spacing: 0.04em;
  }
  .title .lead {
    font-size: 36px; font-weight: 500;
  }
  .title .em {
    font-size: 70px; font-weight: 600;
    color: #1B99B7;
    margin: 0 6px;
  }
  .title .suffix {
    font-size: 30px; font-weight: 500;
    color: #4A5A52;
    margin-left: 8px;
  }
  .date {
    padding: 14px 0;
    border-top: 2px solid #1B99B7;
    border-bottom: 2px solid #1B99B7;
    font-size: 19px; font-weight: 600;
    letter-spacing: 0.04em; color: #2D3E36;
    display: flex; align-items: baseline; gap: 12px;
    flex-wrap: nowrap; white-space: nowrap;
  }
  .date .small { font-size: 13px; color: #5A5A5A; font-weight: 500; }
  .date .place { font-size: 15px; color: #2A2A2A; font-weight: 500; margin-left: 4px; }
</style>
</head>
<body>
  <div class="hero">
    <div class="photo"></div>
    <div class="content">
      <div class="vertical">ONLINE DIALOGUE vol.01</div>
      <div class="tag-pos"><span class="tag">30代の生き方シリーズvol.01</span></div>
      <div class="main-block">
        <p class="title-lead">自分自身が納得できる、</p>
        <h1 class="title">
          <span class="lead">30代の生き方を</span><span class="em">問い直す</span><span class="suffix">90分。</span>
        </h1>
      </div>
      <div class="date-pos">
        <div class="date">
          <span>5/15 <span class="small">(金)</span></span>
          <span>20:00〜21:30</span>
          <span class="place">@Zoom</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
