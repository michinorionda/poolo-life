<style>

  body {

    margin: 0;
    padding: 24px 16px;
    line-height: 1.7;

  header { text-align: center; margin-bottom: 32px; }
  h1 {
    font-family: "Shippori Mincho", "Yu Mincho", serif;
    font-size: 28px;

    color: var(--brand-deep);
    letter-spacing: 0.05em;
  }
  .subtitle { color: var(--mute); font-size: 13px; margin: 0; }
  .modes {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .mode-btn {
    background: white;
    border: 1.5px solid var(--line);
    color: var(--mute);
    padding: 10px 16px;
    border-radius: 999px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .mode-btn:hover { border-color: var(--brand); color: var(--brand); }
  .mode-btn.active {
    background: var(--brand);
    color: white;
    border-color: var(--brand);
  }
  .stats {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: white;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 12px 20px;
    margin-bottom: 16px;
    font-size: 13px;
    color: var(--mute);
  }
  .stat-item strong { color: var(--ink); font-size: 16px; }
  .accuracy { color: var(--brand-deep); }
  .card {
    background: white;
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 28px 24px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.03);

  .question-label {
    color: var(--terra);
    font-size: 11px;
    letter-spacing: 0.15em;
    font-weight: 600;
    margin-bottom: 12px;
  }
  .question-body {
    font-size: 17px;
    margin-bottom: 24px;
    padding: 18px 20px;
    background: var(--paper);
    border-left: 3px solid var(--brand);
    border-radius: 0 8px 8px 0;
    line-height: 1.8;
  }
  .hint-row { margin: 4px 0; }
  .hint-key {
    display: inline-block;
    color: var(--mute);
    font-size: 12px;
    width: 88px;
    vertical-align: top;
  }
  .hint-val { font-size: 15px; color: var(--ink); }
  .options {
    display: grid;
    gap: 10px;
  }
  .option {
    background: white;
    border: 1.5px solid var(--line);
    border-radius: 10px;
    padding: 14px 18px;
    text-align: left;
    cursor: pointer;
    font-size: 15px;
    color: var(--ink);
    transition: all 0.15s;
    font-family: inherit;
  }
  .option:hover:not(:disabled) {
    border-color: var(--brand);
    background: #F4FAFC;
  }
  .option:disabled { cursor: default; }
  .option.correct {
    border-color: var(--ok);
    background: #EBF6F0;
    color: var(--ok);
    font-weight: 600;
  }
  .option.wrong {
    border-color: var(--ng);
    background: #FAEEEC;
    color: var(--ng);
  }
  .option.dim { opacity: 0.5; }
  .feedback {
    margin-top: 20px;
    padding: 16px 18px;
    border-radius: 10px;
    background: var(--paper);
    font-size: 14px;
    border: 1px dashed var(--line);

    margin: 0 0 8px;
    font-size: 14px;
    color: var(--brand-deep);

  .feedback-row {
    display: flex;
    gap: 12px;
    font-size: 13px;
    margin: 3px 0;

  .next-btn {

    background: var(--brand);
    color: white;
    border: none;
    padding: 14px;

  .gate-btn {

    <button class="gate-btn" id="pwBtn">入る</button>
    <p class="gate-err" id="pwErr"></p>
  </div>
</div>
<div class="wrap" id="main" style="display:none">
  <header>
    <h1>POOLO LIFE 12期 メンバークイズ</h1>

  </header>

  <div class="modes">
    <button class="mode-btn active" data-mode="profile">プロフィール → 人物</button>
    <button class="mode-btn" data-mode="nick2name">あだ名 → 本名</button>
    <button class="mode-btn" data-mode="name2nick">本名 → あだ名</button>
    <button class="mode-btn" data-mode="mix">ミックス</button>
  </div>

  <div class="stats">
    <div class="stat-item">出題 <strong id="total">0</strong></div>
    <div class="stat-item">正解 <strong id="correct">0</strong></div>
    <div class="stat-item accuracy">正答率 <strong id="rate">—</strong></div>
    <button class="reset-btn" onclick="resetStats()">リセット</button>
  </div>

  <div class="card" id="card"></div>
</div>

const PW_HASH = "b55dddc18cc93bfe11c93c4c066d02569b8ad0dc75f723dca125be250bb3f979";
async function sha256(s) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(s));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
}
async function tryPw() {
  const v = document.getElementById("pwInput").value;
  const err = document.getElementById("pwErr");
  if (!v) { err.textContent = "合言葉を入れてください"; return; }
  const h = await sha256(v);
  if (h === PW_HASH) {
    sessionStorage.setItem("poolo12_unlocked", "1");
    document.getElementById("gate").style.display = "none";
    document.getElementById("main").style.display = "block";
    next();
  } else {
    err.textContent = "違うみたい";
  }
}
document.getElementById("pwBtn").addEventListener("click", tryPw);
document.getElementById("pwInput").addEventListener("keydown", e => { if (e.key === "Enter") tryPw(); });

let mode = "profile";
let currentQ = null;
let answered = false;
let total = 0;
let correct = 0;

const card = document.getElementById("card");
const totalEl = document.getElementById("total");
const correctEl = document.getElementById("correct");
const rateEl = document.getElementById("rate");

document.querySelectorAll(".mode-btn").forEach(b => {
  b.addEventListener("click", () => {
    document.querySelectorAll(".mode-btn").forEach(x => x.classList.remove("active"));
    b.classList.add("active");
    mode = b.dataset.mode;
    next();
  });
});

function pick(arr, n) {
  const c = [...arr];
  const out = [];
  while (out.length < n && c.length) {
    out.push(c.splice(Math.floor(Math.random() * c.length), 1)[0]);
  }
  return out;
}

function makeQuestion() {
  let actual = mode === "mix" ? ["profile","nick2name","name2nick"][Math.floor(Math.random()*3)] : mode;
  const ans = PEOPLE[Math.floor(Math.random() * PEOPLE.length)];
  const others = pick(PEOPLE.filter(p => p !== ans), 3);
  const choices = pick([ans, ...others], 4);

  if (actual === "profile") {
    const hints = [];
    if (ans.res) hints.push({k:"居住地", v:ans.res});
    if (ans.home && ans.home !== ans.res) hints.push({k:"出身地", v:ans.home});
    if (ans.mbti) hints.push({k:"MBTI", v:ans.mbti});
    if (ans.pers) hints.push({k:"性格", v:ans.pers});
    if (ans.hob) hints.push({k:"趣味", v:ans.hob});
    if (ans.theme) hints.push({k:"探究テーマ", v:ans.theme});
    if (ans.ctry) hints.push({k:"行った国数", v:ans.ctry + "ヶ国"});
    return {
      type: "profile",
      label: "この人は誰?",
      body: hints,
      choices: choices.map(c => c.n + "（" + c.nk + "）"),
      answerIdx: choices.indexOf(ans),
      ans
    };
  } else if (actual === "nick2name") {
    return {
      type: "nick2name",
      label: "このあだ名の本名は?",
      body: [{k:"あだ名", v:ans.nk}],
      choices: choices.map(c => c.n),
      answerIdx: choices.indexOf(ans),
      ans
    };
  } else {
    return {
      type: "name2nick",
      label: "この人のあだ名は?",
      body: [{k:"本名", v:ans.n + (ans.fu ? "（" + ans.fu + "）" : "")}],
      choices: choices.map(c => c.nk),
      answerIdx: choices.indexOf(ans),
      ans
    };
  }
}

function render() {
  const q = currentQ;
  const hints = q.body.map(h =>
    `<div class="hint-row"><span class="hint-key">${h.k}</span><span class="hint-val">${h.v}</span></div>`
  ).join("");
  const opts = q.choices.map((c, i) =>
    `<button class="option" data-i="${i}">${c}</button>`
  ).join("");
  card.innerHTML = `
    <div class="question-label">${q.label}</div>
    <div class="question-body">${hints}</div>
    <div class="options">${opts}</div>
    <div class="feedback" id="fb" style="display:none"></div>
  `;
  card.querySelectorAll(".option").forEach(b => {
    b.addEventListener("click", () => choose(parseInt(b.dataset.i)));
  });
  answered = false;
}

function choose(i) {
  if (answered) return;
  answered = true;
  total++;
  const right = i === currentQ.answerIdx;
  if (right) correct++;
  updateStats();

  const opts = card.querySelectorAll(".option");
  opts.forEach((b, idx) => {
    b.disabled = true;
    if (idx === currentQ.answerIdx) b.classList.add("correct");
    else if (idx === i) b.classList.add("wrong");
    else b.classList.add("dim");
  });

  const a = currentQ.ans;
  const fb = document.getElementById("fb");
  fb.style.display = "block";
  fb.innerHTML = `
    <h3>${right ? "正解!" : "残念..."} ${a.n}（${a.nk}）<span class="badge">${a.team}</span></h3>
    <div class="feedback-row"><span class="feedback-key">居住／出身</span><span class="feedback-val">${a.res} / ${a.home}</span></div>
    ${a.mbti ? `<div class="feedback-row"><span class="feedback-key">MBTI</span><span class="feedback-val">${a.mbti}</span></div>` : ""}
    ${a.pers ? `<div class="feedback-row"><span class="feedback-key">性格</span><span class="feedback-val">${a.pers}</span></div>` : ""}
    ${a.hob ? `<div class="feedback-row"><span class="feedback-key">趣味</span><span class="feedback-val">${a.hob}</span></div>` : ""}
    ${a.theme ? `<div class="feedback-row"><span class="feedback-key">探究テーマ</span><span class="feedback-val">${a.theme}</span></div>` : ""}
    <button class="next-btn" onclick="next()">次の問題 →</button>
  `;
}

function next() {
  currentQ = makeQuestion();
  render();
}

function updateStats() {
  totalEl.textContent = total;
  correctEl.textContent = correct;
  rateEl.textContent = total ? Math.round(correct / total * 100) + "%" : "—";
}

function resetStats() {
  total = 0; correct = 0;
  updateStats();
  next();
}

if (sessionStorage.getItem("poolo12_unlocked") === "1") next();
</script>
