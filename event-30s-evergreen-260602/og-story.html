<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>OG Story — 1080x1920</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Noto+Sans+JP:wght@300;400;500;600;700&family=Shippori+Mincho+B1:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1080px; height: 1920px;
    background: #FFFCF6;
    font-family: 'Shippori Mincho B1', serif;
    overflow: hidden;
  }
  .canvas {
    width: 1080px; height: 1920px;
    display: grid;
    grid-template-rows: 1080px 840px;
    position: relative;
  }
  .photo {
    background-image: url('images/01_542.jpg');
    background-size: cover;
    background-position: center 60%;
    filter: saturate(0.92) sepia(0.06) brightness(1.02);
  }
  .content {
    background: #FFFCF6;
    position: relative;
    padding: 80px 88px;
    display: flex;
    flex-direction: column;
  }
  .vertical {
    position: absolute;
    right: 28px;
    top: 1080px; bottom: 0;
    writing-mode: vertical-rl;
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    letter-spacing: 0.4em;
    color: rgba(45,62,54,0.10);
    font-weight: 700;
    font-style: italic;
    display: flex;
    align-items: center;
    text-transform: uppercase;
  }
  .tag {
    align-self: flex-start;
    background: #1B99B7;
    color: #fff;
    padding: 12px 26px;
    font-size: 18px;
    font-weight: 500;
    letter-spacing: 0.12em;
    border-radius: 2px;
    font-family: 'Shippori Mincho B1', serif;
    margin-bottom: 32px;
  }
  .title-lead {
    font-size: 30px; font-weight: 400;
    letter-spacing: 0.08em; line-height: 1.6;
    margin-bottom: 24px; color: #2D3E36;
  }
  .title { color: #2D3E36; }
  .title .row-mid {
    display: block;
    font-size: 54px; font-weight: 500;
    letter-spacing: 0.06em; line-height: 1.45;
    margin-bottom: 24px;
  }
  .title .row-main {
    display: flex; align-items: baseline;
    gap: 18px;
    line-height: 1;
  }
  .title .em {
    font-size: 120px; font-weight: 600;
    color: #1B99B7;
    letter-spacing: 0.04em;
  }
  .title .suffix {
    font-size: 56px; font-weight: 500;
    color: #4A5A52;
    letter-spacing: 0.06em;
  }
  .date {
    margin-top: auto;
    padding: 22px 0;
    border-top: 2px solid #1B99B7;
    border-bottom: 2px solid #1B99B7;
    font-size: 28px; font-weight: 600;
    letter-spacing: 0.04em; color: #2D3E36;
    display: flex; align-items: baseline; gap: 16px;
    flex-wrap: nowrap; white-space: nowrap;
  }
  .date .small { font-size: 20px; color: #5A5A5A; font-weight: 500; }
  .date .place { font-size: 22px; color: #2A2A2A; font-weight: 500; margin-left: 8px; }
</style>
</head>
<body>
  <div class="canvas">
    <div class="photo"></div>
    <div class="content">
      <div class="vertical">ONLINE DIALOGUE vol.01</div>
      <span class="tag">30代の生き方シリーズvol.01</span>
      <p class="title-lead">自分自身が納得できる、</p>
      <h1 class="title">
        <span class="row-mid">30代の生き方を</span>
        <span class="row-main">
          <span class="em">問い直す</span><span class="suffix">90分</span>
        </span>
      </h1>
      <div class="date">
        <span>開催日程はLINEでご案内</span>
        <span class="place">@Zoom</span>
      </div>
    </div>
  </div>
</body>
</html>
